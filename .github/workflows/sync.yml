name: Sync LibreLinkUp to Nightscout

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm start
        env:
          LINK_UP_USERNAME: ${{ secrets.LINK_UP_USERNAME }}
          LINK_UP_PASSWORD: ${{ secrets.LINK_UP_PASSWORD }}
          LINK_UP_REGION: EU
          NIGHTSCOUT_URL: ${{ secrets.NIGHTSCOUT_URL }}
          NIGHTSCOUT_API_TOKEN: ${{ secrets.NIGHTSCOUT_API_TOKEN }}
          SINGLE_SHOT: 'true'
          LOG_LEVEL: info
          
